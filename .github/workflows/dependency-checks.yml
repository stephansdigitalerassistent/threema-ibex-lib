name: Dependency Checks

on:
  schedule:
    # Run weekly at midnight on Sunday
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  check-dependencies:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm run audit:check

      - name: Run npm outdated
        run: npm run outdated:check
